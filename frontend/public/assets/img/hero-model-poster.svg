<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" role="img" aria-label="3D gem">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="b" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#7c5cff" stop-opacity=".35"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="180" r="165" fill="url(#glow)"/>
  <!-- icosahedron-ish gem projection -->
  <g stroke="#0b0d14" stroke-opacity=".18" stroke-width="1.5" stroke-linejoin="round">
    <polygon points="200,40 320,120 200,180" fill="url(#a)" opacity=".95"/>
    <polygon points="200,40 80,120 200,180" fill="url(#b)" opacity=".8"/>
    <polygon points="80,120 200,180 120,270" fill="url(#a)" opacity=".7"/>
    <polygon points="320,120 200,180 280,270" fill="url(#b)" opacity=".9"/>
    <polygon points="200,180 120,270 200,320" fill="url(#b)" opacity=".6"/>
    <polygon points="200,180 280,270 200,320" fill="url(#a)" opacity=".8"/>
    <polygon points="80,120 120,270 200,320" fill="url(#a)" opacity=".45"/>
    <polygon points="320,120 280,270 200,320" fill="url(#b)" opacity=".5"/>
  </g>
</svg>
