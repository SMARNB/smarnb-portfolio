<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />

  <!-- SEO is managed from the developer dashboard (/admin → SEO) and injected
       per-route by the FastAPI server before the HTML is sent to the browser /
       crawler: title, meta description/keywords/author, canonical, robots, Open
       Graph, Twitter cards, search-engine verification, theme-color, icons,
       manifest and JSON-LD. The three tags below are ONLY a static fallback for
       `vite dev` (which has no server-side injection); in production the server
       strips and replaces them. Do not add SEO tags here — edit them in /admin. -->
  <title>Muhammad Ali Raza — Full-Stack Developer, Automation &amp; Design</title>
  <meta name="description" content="Freelance full-stack developer &amp; designer — Python SaaS dashboards, Selenium &amp; OCR automation, computer vision, Figma UI/UX and premium product packaging." />
  <link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml" />

  <!-- Theme is applied by src/main.tsx before render (an external module, so it
       satisfies the strict CSP script-src 'self'). <html> defaults to dark. -->

  <!-- Splash screen: lives in the shell so it paints with the HTML (before the
       JS bundle parses + React mounts + data loads). main.tsx fades it out once
       the app is painted. Colours are hard-coded (no dependency on the CSS
       bundle) and inline styles are permitted by the CSP (style-src 'unsafe-inline'). -->
  <style>
    #splash { position: fixed; inset: 0; z-index: 9999; display: grid; place-items: center; overflow: hidden;
      background:
        radial-gradient(1100px 560px at 50% 16%, rgba(99,102,241,.18), transparent 60%),
        radial-gradient(900px 520px at 50% 102%, rgba(99,102,241,.10), transparent 60%),
        #0a0d14;
      transition: opacity .5s ease, visibility .5s ease; }
    #splash.splash--hide { opacity: 0; visibility: hidden; pointer-events: none; }
    /* Ambient service chips drifting + zooming behind the brand mark. */
    .splash-orbit { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .svc-chip { position: absolute; left: var(--x); top: var(--y); white-space: nowrap;
      padding: .42rem .82rem; border-radius: 999px;
      font: 600 .82rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #d7def0; background: rgba(99,102,241,.10); border: 1px solid rgba(99,102,241,.32);
      box-shadow: 0 10px 34px -12px rgba(99,102,241,.5);
      opacity: 0; transform: translateY(16px) scale(.68);
      animation: svcFloat var(--dur, 7s) ease-in-out var(--d, 0s) infinite; will-change: transform, opacity; }
    .splash-inner { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: .9rem; }
    .splash-mark { display: grid; place-items: center;
      filter: drop-shadow(0 14px 44px rgba(99,102,241,.55)); animation: splashPop .5s cubic-bezier(.22,1,.36,1); }
    .splash-mark svg { width: 76px; height: 76px; }
    .splash-name { font: 800 1.15rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #eef2f9; }
    .splash-tag { font: 600 .8rem/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #8b95a8; }
    .splash-bar { margin-top: .3rem; width: 150px; height: 3px; border-radius: 3px; background: rgba(255,255,255,.1); overflow: hidden; }
    .splash-bar::after { content: ""; display: block; height: 100%; width: 40%; border-radius: 3px;
      background: #6366f1; animation: splashLoad 1.1s ease-in-out infinite; }
    @keyframes splashPop { from { opacity: 0; transform: scale(.82); } to { opacity: 1; transform: scale(1); } }
    @keyframes splashLoad { 0% { transform: translateX(-130%); } 100% { transform: translateX(360%); } }
    @keyframes svcFloat {
      0%   { opacity: 0; transform: translateY(16px) scale(.68); }
      18%  { opacity: .95; }
      50%  { opacity: 1; transform: translateY(-10px) scale(1.08); }
      82%  { opacity: .85; }
      100% { opacity: 0; transform: translateY(-24px) scale(.82); }
    }
    @media (max-width: 640px) { .svc-chip:nth-child(n+5) { display: none; } }
    @media (prefers-reduced-motion: reduce) {
      .splash-mark { animation: none; }
      .splash-bar::after { animation: none; width: 100%; }
      .svc-chip { animation: none; opacity: .5; transform: none; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="splash" aria-hidden="true">
    <div class="splash-orbit">
      <span class="svc-chip" style="--x:10%;--y:22%;--d:0s;--dur:7s">SaaS Dashboards</span>
      <span class="svc-chip" style="--x:64%;--y:15%;--d:1.1s;--dur:8s">Selenium Automation</span>
      <span class="svc-chip" style="--x:12%;--y:70%;--d:.5s;--dur:7.5s">Computer Vision</span>
      <span class="svc-chip" style="--x:70%;--y:66%;--d:1.6s;--dur:8.5s">Figma UI/UX</span>
      <span class="svc-chip" style="--x:42%;--y:9%;--d:2.1s;--dur:7s">Packaging Design</span>
      <span class="svc-chip" style="--x:77%;--y:40%;--d:.9s;--dur:8s">AI Chatbots</span>
      <span class="svc-chip" style="--x:7%;--y:46%;--d:1.8s;--dur:7.5s">OCR &amp; Data</span>
      <span class="svc-chip" style="--x:56%;--y:84%;--d:2.6s;--dur:8s">Web Apps</span>
    </div>
    <div class="splash-inner">
      <div class="splash-mark">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="64" height="64" rx="16" fill="#6366f1"/>
          <path d="M41 21 C41 15.5 35.5 12.5 28.5 12.5 C21.5 12.5 16.5 15.5 16.5 20.5 C16.5 25 20 26.7 28.5 27.6 C37 28.5 46 29.5 46 35 C46 40.5 40.5 43.5 33 43.5 C26 43.5 20.5 41 19 36" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M49 8.5 L50.5 12.5 L54.5 14 L50.5 15.5 L49 19.5 L47.5 15.5 L43.5 14 L47.5 12.5 Z" fill="#ffffff"/>
          <text x="32" y="56" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-weight="700" font-size="8" letter-spacing="1.6" fill="#ffffff">SMARNB</text>
        </svg>
      </div>
      <div class="splash-name">Muhammad Ali Raza</div>
      <div class="splash-tag">Full-Stack · Automation · Design</div>
      <div class="splash-bar"></div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
