# Keep the Render free-tier site warm, for free, without my own machine running.
#
# This runs scripts/keepalive.py on a schedule from GitHub's servers, so the ping
# happens 24/7 even when nobody is visiting. The ping hits /api/services, which
# wakes BOTH the web app and the Neon database, so the next real visitor gets an
# instant load instead of a 1-3 minute cold start.
#
# ── Caveats worth knowing (GitHub's, not ours) ──────────────────────────────
#  • Cron granularity & drift: the smallest interval GitHub accepts is 5 minutes,
#    but scheduled runs are *best-effort* and can be DELAYED (sometimes 5-15 min)
#    or skipped when GitHub is busy. We ask for every ~13 minutes so that even
#    with drift we comfortably stay under Render's ~15-minute idle window. If you
#    see gaps, that's GitHub's scheduler, not the script.
#  • 60-day inactivity pause: GitHub automatically DISABLES scheduled workflows in
#    a repo that has had no commits for ~60 days. Push any commit (or click
#    "Enable workflow" / "Run workflow" in the Actions tab) to wake it back up.
#    The keep-alive itself does not count as repo activity.
#  • Only runs from the DEFAULT branch's copy of this file.
#
# Target URL: set a repository variable KEEPALIVE_URL (Settings → Secrets and
# variables → Actions → Variables) to override the default baked into the script.

name: keepalive

on:
  schedule:
    # ~every 13 minutes (min granularity is 5; expect drift). Cron is UTC.
    - cron: "*/13 * * * *"
  workflow_dispatch: {}   # lets you trigger a ping manually from the Actions tab

# If a previous ping is somehow still running, don't pile up.
concurrency:
  group: keepalive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out the keep-alive script
        uses: actions/checkout@v4

      - name: Ping the site (warms app + Neon DB)
        env:
          # Falls back to the default in scripts/keepalive.py if the variable is unset.
          KEEPALIVE_URL: ${{ vars.KEEPALIVE_URL }}
          KEEPALIVE_TIMEOUT: "60"
          KEEPALIVE_RETRIES: "4"
        run: python scripts/keepalive.py
