# Render Blueprint — deploys the whole app (site + API + dashboards) on the free
# tier. In the Render dashboard: New → Blueprint → connect this repo → Apply.
#
# You'll be asked to fill the two secret values (marked sync:false):
#   ADMIN_PASSWORD  → a strong password (this gates your dashboard remotely!)
#   DATABASE_URL    → your free Neon Postgres URL, converted to the pg8000 driver:
#                     postgresql+pg8000://USER:PASSWORD@HOST/DBNAME?sslmode=require
#                     (and uncomment pg8000 in backend/requirements.txt)
#
# Service name "smarnb" → your site lives at https://smarnb.onrender.com
# SECRET_KEY is generated once and kept stable (so encrypted data stays readable).
services:
  - type: web
    name: smarnb
    runtime: python
    rootDir: backend
    plan: free
    autoDeploy: true            # every push to `main` auto-redeploys — no manual deploy needed
    # Two-step build: build the React frontend (Vite → frontend/dist, which FastAPI
    # serves), then install the Python deps. buildCommand runs from rootDir (backend),
    # so we hop up to ../frontend for the Node build. Render's native Python runtime
    # ships Node + npm, so `npm` is available here.
    # FALLBACK: if a future Render image lacks Node and this build step fails, commit
    # the built frontend/dist to the repo and change this back to just the pip line —
    # FastAPI will serve the committed build unchanged.
    buildCommand: cd ../frontend && npm ci && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    # rootDir would otherwise limit autodeploys to backend/ changes only. This filter
    # re-includes the whole repo (paths are relative to repo root) so FRONTEND edits
    # (assets/, *.html) also auto-deploy on every push. "**/*" = every file, any depth.
    buildFilter:
      paths:
        - "**/*"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: SECRET_KEY
        generateValue: true        # generated once, then stable across deploys
      - key: ADMIN_EMAIL
        value: shahjee975@gmail.com
      - key: ADMIN_NAME
        value: Muhammad Ali Raza
      - key: ADMIN_PASSWORD
        sync: false                # ⚠️ set a strong password when prompted
      - key: DATABASE_URL
        sync: false                # Neon Postgres (pg8000) URL — for persistence
      - key: ENCRYPTION_KEY
        sync: false                # optional; if blank, derived from SECRET_KEY
      - key: CORS_ORIGINS
        value: "*"                 # bearer-token API (no cookies) → * is safe
      - key: PUBLIC_BASE_URL
        value: https://smarnb.onrender.com   # Stripe redirects + the self-keepalive ping
      # Self keep-warm: ON by default on Render (pings PUBLIC_BASE_URL/api/health every
      # 10 min so the free instance never sleeps → no cold starts → Google can always
      # fetch robots.txt/sitemap and index. Always-warm ≈720h/mo < the 750h free quota.
      # Set KEEPALIVE_SELF=0 to disable (e.g. if you add a 2nd free service and need the hours).
      # - key: KEEPALIVE_SELF
      #   value: "1"
      - key: CONTACT_WHATSAPP
        value: "+92 341 4527256"             # the assistant shares this when asked how to reach you
      # --- Owner WhatsApp pings (optional): get pinged with the chat/client id when
      # a visitor needs a human or places an order. Pings go to CONTACT_WHATSAPP.
      # Easiest: CallMeBot — message their number once for a key, then set it here.
      # - key: CALLMEBOT_APIKEY
      #   sync: false
      #
      # --- WhatsApp Business <-> site-chat bridge (optional, OFF until all 3 set) ---
      # Two-way: visitors message your WhatsApp number → it lands in the admin Inbox
      # (same chat model), the bot auto-replies, and your Inbox replies go back to
      # WhatsApp. First-party server-to-server (no page script). Setup, one time:
      #   1) Meta Business account + a WhatsApp Business number in Meta Business Suite.
      #   2) developers.facebook.com → create an app → add the "WhatsApp" product.
      #   3) Copy the Phone number ID  → WHATSAPP_PHONE_ID.
      #   4) Generate a PERMANENT access token (System User token) → WHATSAPP_TOKEN.
      #   5) Invent any random string → WHATSAPP_VERIFY_TOKEN (used in the next step).
      #   6) Webhooks → Callback URL: https://smarnb.onrender.com/api/whatsapp/webhook
      #      Verify token: the WHATSAPP_VERIFY_TOKEN above → Verify and save.
      #   7) Subscribe the webhook to the "messages" field.
      # - key: WHATSAPP_TOKEN
      #   sync: false
      # - key: WHATSAPP_PHONE_ID
      #   sync: false
      # - key: WHATSAPP_VERIFY_TOKEN
      #   sync: false
      # --- Stripe (optional, add later to enable card payments) ---
      # - key: STRIPE_SECRET_KEY
      #   sync: false
      # - key: STRIPE_WEBHOOK_SECRET
      #   sync: false
      # --- Safepay (optional — Pakistan card/wallet gateway, settles to YOUR bank) ---
      # OFF until SAFEPAY_API_KEY is set. Hosted-redirect flow (buyer pays on
      # getsafepay.com) so the strict first-party CSP is untouched. Setup:
      #   1) Sign up at getsafepay.com, complete KYC (CNIC + bank account for payout).
      #   2) Dashboard → Developers → copy the API key ("sec_…") → SAFEPAY_API_KEY.
      #   3) Test in sandbox first: SAFEPAY_ENVIRONMENT=sandbox and run a test charge;
      #      confirm the amount is right (if 100× off, set SAFEPAY_AMOUNT_MULTIPLIER=1).
      #   4) (Optional) Webhooks → add https://smarnb.onrender.com/api/payments/safepay/webhook
      #      and copy the signing secret → SAFEPAY_WEBHOOK_SECRET.
      #   5) Go live: set SAFEPAY_ENVIRONMENT=production with your live API key.
      # Your bank details live in Safepay's dashboard, never in this app.
      # - key: SAFEPAY_API_KEY
      #   sync: false
      # - key: SAFEPAY_ENVIRONMENT
      #   value: sandbox
      # - key: SAFEPAY_WEBHOOK_SECRET
      #   sync: false
      # Store prices are USD; Safepay charges PKR. Totals convert with a live FX
      # rate (cached 6h). Optionally pin the rate / add a % buffer:
      # - key: SAFEPAY_FX_RATE
      #   value: "0"
      # - key: SAFEPAY_FX_MARGIN_PCT
      #   value: "0"
      # --- Email verification (SendGrid) — anti-spam gate ---
      # Render blocks SMTP, so verification emails go via SendGrid's HTTPS API.
      # Email verification + "verified account required to order" stay OFF until BOTH
      # SENDGRID_API_KEY and EMAIL_FROM are set (nothing breaks before then). Setup:
      #   1) sendgrid.com → free account → Settings → API Keys → create a "Mail Send" key.
      #   2) Settings → Sender Authentication → verify a Single Sender (or your domain).
      #   3) Set SENDGRID_API_KEY + EMAIL_FROM (the verified sender) below.
      # - key: SENDGRID_API_KEY
      #   sync: false
      # - key: EMAIL_FROM
      #   sync: false               # e.g. no-reply@yourdomain.com (must be verified in SendGrid)
      # - key: EMAIL_FROM_NAME
      #   value: SMARNB
      # --- Two-factor auth (TOTP) — required for admin, optional for clients ---
      # Works with Google/Microsoft Authenticator, Authy, etc. No external service.
      # - key: TOTP_ISSUER
      #   value: SMARNB
      # - key: ADMIN_2FA_REQUIRED   # set to 0 only if you must temporarily allow admin login without 2FA
      #   value: "1"
